/* Cards UI Upgrade */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
    padding: 20px;
}

.card {
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 20px;
    color: #000;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    cursor: pointer;
    transition: 0.4s;
    text-align: center;
}

.card:hover {
    transform: translateY(-10px) scale(1.05);
    background: #48D1CC;
    color: white;
}

/* Modal Styling */
.modal {
    display: none;
    position: fixed;
    z-index: 999;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    animation: fadeIn 0.3s;
}

.modal-content {
    background: white;
    margin: 8% auto;
    padding: 25px;
    width: 60%;
    border-radius: 12px;
    position: relative;
    animation: zoomIn 0.4s;
}

.close {
    position: absolute;
    right: 20px;
    top: 10px;
    font-size: 25px;
    cursor: pointer;
}

/* Animations */
@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

@keyframes zoomIn {
    from {transform: scale(0.7);}
    to {transform: scale(1);}
}
.chatbox {
    position: fixed;
    bottom: 20px;
    right: 20px;

    padding: 15px;
    border-radius: 10px;

}

.chatbox input {

}

.chatbox button {
    width: 100%;
    margin-top: 5px;
    padding: 8px;
    border: none;
    background: #48D1CC;
    cursor: pointer;
}
</style>

<script type="module">

<script>
  window.showComments = async function () {
    let list = document.getElementById("commentsList");
    list.innerHTML = "Loading...";

    const querySnapshot = await getDocs(collection(db, "comments"));

    list.innerHTML = "";

    querySnapshot.forEach((doc) => {
        list.innerHTML += `<p>💬 ${doc.data().text}</p><hr>`;
    });

    document.getElementById("commentModal").style.display = "block";
};
  window.addComment = async function () {
    let input = document.getElementById("commentInput");
    let comment = input.value;

    if (comment.trim() === "") return alert("Write something!");

    await addDoc(collection(db, "comments"), {
        text: comment,
        time: new Date()
    });

    input.value = "";
    alert("Feedback submitted 💙");
};
var myIndex = 0;
carousel();

function carousel() {
  var i;
  var x = document.getElementsByClassName("mySlides");
  for (i = 0; i < x.length; i++) {
    x[i].style.display = "none";  
  }
  myIndex++;
  if (myIndex > x.length) {myIndex = 1}    
  x[myIndex-1].style.display = "block";  
  setTimeout(carousel, 2000); // Change image every 2 seconds
}
</script>

        <div id="commentsList"></div>

<script>

/* Data */
const intro = "Darshan Raval is an Indian singer, songwriter, composer, and actor. Born on October 18, 1994 in Ahmedabad. He became famous after India's Raw Star.";

const mstyle = "His music blends pop, romantic, and soft melodies. His songs are emotional and relatable.";

const breakthrough = "His breakthrough came in 2017 with 'Tera Zikr', which became massively popular.";

const fans = "His fans are known as the 'Blue Family'. They are very loyal and supportive.";

const family = "His father Rajendra Raval is a writer and his mother Rajal Raval is a homemaker.";

const education = "He studied at Shree Swaminarayan Gurukul, Ahmedabad.";

/* Functions */
function openModal(title, text) {
    document.getElementById("modalTitle").innerText = title;
    document.getElementById("modalText").innerText = text;
    document.getElementById("popupModal").style.display = "block";
}

function closeModal() {
    document.getElementById("popupModal").style.display = "none";
}

window.onclick = function(event) {
    let modal = document.getElementById("popupModal");
    if (event.target == modal) {
        modal.style.display = "none";
    }
}
</script>
<script>
// Add comment
function addComment() {
    let input = document.getElementById("commentInput");
    let comment = input.value;

    if (comment.trim() === "") {
        alert("Write something!");
        return;
    }

    let comments = JSON.parse(localStorage.getItem("comments")) || [];
    comments.push(comment);

    localStorage.setItem("comments", JSON.stringify(comments));

    input.value = "";
    alert("Feedback submitted 💙");
}

// Show comments
function showComments() {
    let comments = JSON.parse(localStorage.getItem("comments")) || [];
    let list = document.getElementById("commentsList");

    list.innerHTML = "";

    if (comments.length === 0) {
        list.innerHTML = "<p>No comments yet 😔</p>";
    } else {
        comments.forEach((c, index) => {
            list.innerHTML += `<p>💬 ${c}</p><hr>`;
        });
    }

    document.getElementById("commentModal").style.display = "block";
}

// Close modal
function closeComments() {
    document.getElementById("commentModal").style.display = "none";
}
</script>
