<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Darshan Raval- Website</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #eef4fb;
    --surface: #f7fafd;
    --card: #ffffff;
    --border: #c5d9ef;
    --accent: #2563eb;
    --accent2: #0ea5e9;
    --text: #0f1c35;
    --muted: #6b85a8;
    --radius: 14px;
  }
  *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 999; opacity: 0.15;
  }
#top-left-btn {
    position: fixed; /* Positions relative to the browser window */
    top: 10px;       /* Distance from the top edge */
    left: 10px;      /* Distance from the left edge */
    z-index: 99;     /* Ensures it's above other elements */
    /* Add other styling as needed */
    padding: 10px;
    background-color: #007bff;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

  /* HERO */
  .hero { background: linear-gradient(160deg, #ddeeff 0%, #eef4fb 60%); border-bottom: 1px solid var(--border); padding: 60px 40px 50px; text-align: center; position: relative; overflow: hidden; }
  .hero::before { content: ''; position: absolute; top: -100px; left: 50%; transform: translateX(-50%); width: 500px; height: 300px; background: radial-gradient(ellipse, rgba(37,99,235,0.10) 0%, transparent 70%); pointer-events: none; }
  .hero-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 4px; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; }
  .hero h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(52px, 10vw, 100px); letter-spacing: 6px; line-height: 1; color: var(--text); margin-bottom: 14px; }
  .hero h1 span { color: var(--accent); }
  .hero p { color: var(--muted); font-size: 15px; max-width: 420px; margin: 0 auto; line-height: 1.6; }
  .search-wrap { max-width: 500px; margin: 32px auto 0; position: relative; }
  .search-wrap input { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 50px; padding: 14px 24px 14px 48px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color .2s, box-shadow .2s; box-shadow: 0 4px 16px rgba(37,99,235,0.08); }
  .search-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.10); }
  .search-wrap::before { content: '🔍'; position: absolute; left: 18px; top: 50%; transform: translateY(-50%); font-size: 15px; pointer-events: none; }

  /* MAIN */
  .main { max-width: 1100px; margin: 0 auto; padding: 48px 24px 80px; }
  .section-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 28px; }
  .section-header h2 { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; }
  .section-header h2 span { color: var(--accent); }
  .song-count-badge { font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); background: var(--card); border: 1px solid var(--border); padding: 3px 10px; border-radius: 20px; }

  /* SONGS GRID */
  .songs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }

  /* SONG CARD */
  .song-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: transform .2s, border-color .2s, box-shadow .2s; animation: fadeUp .4s ease both; box-shadow: 0 2px 12px rgba(37,99,235,0.06); }
  .song-card:hover { transform: translateY(-4px); border-color: rgba(37,99,235,0.35); box-shadow: 0 12px 40px rgba(37,99,235,0.12); }
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  .cover-wrap { position: relative; overflow: hidden; }
  .card-cover { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: var(--surface); display: block; }
  .cover-wrap::after { content: '▶'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 32px; background: rgba(37,99,235,0.45); opacity: 0; transition: opacity .2s; color: #fff; }
  .song-card:hover .cover-wrap::after { opacity: 1; }
  .card-body { padding: 16px 18px 10px; }
  .card-title { font-weight: 600; font-size: 15px; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-artist { color: var(--muted); font-size: 13px; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; padding: 8px 18px 14px; }
  .card-date { font-size: 11px; color: var(--muted); }
  .card-badges { display: flex; gap: 6px; }
  .badge { font-size: 10px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; padding: 3px 8px; border-radius: 4px; }
  .badge-lyrics { background: rgba(37,99,235,0.10); color: var(--accent); }
  .badge-comments { background: rgba(14,165,233,0.12); color: var(--accent2); }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(14,30,60,0.55); z-index: 200; align-items: flex-start; justify-content: center; padding: 24px; overflow-y: auto; backdrop-filter: blur(4px); }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 18px; width: 100%; max-width: 640px; margin: auto; animation: modalIn .3s cubic-bezier(0.34,1.56,0.64,1); overflow: hidden; position: relative; box-shadow: 0 24px 80px rgba(37,99,235,0.18); }
  @keyframes modalIn { from { opacity:0; transform:scale(0.9) translateY(20px); } to { opacity:1; transform:scale(1) translateY(0); } }
  .modal-close { position: absolute; top: 16px; right: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 50%; width: 34px; height: 34px; cursor: pointer; color: var(--muted); display: flex; align-items: center; justify-content: center; font-size: 16px; transition: all .2s; z-index: 10; }
  .modal-close:hover { color: var(--text); border-color: var(--text); }
  .modal-cover { width: 100%; max-height: 260px; object-fit: cover; display: block; }
  .modal-cover-placeholder { width: 100%; height: 200px; background: linear-gradient(135deg, #ddeeff, #c5d9ef); display: flex; align-items: center; justify-content: center; font-size: 56px; }
  .modal-body { padding: 24px 28px 28px; }
  .modal-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
  .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 2px; line-height: 1.1; margin-bottom: 4px; }
  .modal-artist { color: var(--muted); font-size: 14px; margin-bottom: 16px; }

  /* AUDIO PLAYER */
  .audio-player { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; margin-bottom: 20px; }
  .audio-player-label { font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .audio-player audio { width: 100%; height: 40px; border-radius: 8px; outline: none; }
  .ext-link-btn { display: inline-flex; align-items: center; gap: 8px; background: var(--accent); color: #fff; text-decoration: none; font-size: 13px; font-weight: 600; padding: 9px 16px; border-radius: 8px; transition: opacity .2s, transform .15s; }
  .ext-link-btn:hover { opacity: 0.85; transform: translateY(-1px); }
  .ext-link-platform { font-size: 11px; color: var(--muted); margin-top: 6px; }

  /* TABS */
  .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  .tab-btn { background: none; border: none; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 1.5px; padding: 10px 18px; cursor: pointer; border-bottom: 2px solid transparent; transition: all .2s; text-transform: uppercase; }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* LYRICS */
  .lyrics-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; max-height: 220px; overflow-y: auto; font-size: 14px; line-height: 1.9; white-space: pre-wrap; color: var(--text); font-style: italic; }
  .lyrics-box::-webkit-scrollbar { width: 4px; }
  .lyrics-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .desc-box { font-size: 14px; line-height: 1.7; color: var(--muted); }

  /* COMMENTS */
  .comment-form { margin-bottom: 20px; }
  .comment-input-wrap { display: flex; gap: 10px; align-items: flex-start; }
  .comment-input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 11px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; resize: none; min-height: 42px; transition: border-color .2s; }
  .comment-input:focus { border-color: var(--accent); }
  .btn-comment { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 11px 18px; font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 1px; cursor: pointer; transition: opacity .2s; flex-shrink: 0; }
  .btn-comment:hover { opacity: 0.85; }
  .comments-list { display: flex; flex-direction: column; gap: 12px; }
  .comment-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; animation: fadeUp .25s ease; }
  .comment-name { font-size: 12px; font-weight: 600; color: var(--accent); margin-bottom: 4px; }
  .comment-text { font-size: 13px; line-height: 1.6; }
  .comment-time { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .no-comments { text-align: center; color: var(--muted); font-size: 13px; padding: 20px 0; }
  .name-input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 9px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; margin-bottom: 8px; transition: border-color .2s; }
  .name-input:focus { border-color: var(--accent); }

  /* EMPTY / LOADING */
  .empty-state { text-align: center; padding: 80px 20px; color: var(--muted); grid-column: 1/-1; }
  .empty-state .icon { font-size: 52px; margin-bottom: 16px; }
  .empty-state h3 { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; margin-bottom: 8px; color: var(--text); }
</style>
</head>
<body>

<div class="hero">
  <button id="top-left-btn" ><a href="home.html">Home</a></button>
  <div class="hero-eyebrow">🎤 For All My Blue Family</div>
  <h1>Darshan<span>Raval</span></h1>
  <p>All tracks, lyrics, and vibes — in one place.</p>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Search songs......." oninput="filterSongs()"/>
  </div>
</div>

<div class="main">
  <div class="section-header">
    <h2>Latest <span>Tracks</span></h2>
    <span class="song-count-badge" id="countBadge">Loading…</span>
  </div>
  <div class="songs-grid" id="songsGrid">
    <div class="empty-state">
      <div class="icon">⏳</div>
      <h3>Loading Songs…</h3>
      <p>Fetching the latest tracks.</p>
    </div>
  </div>
</div>


<!-- SONG MODAL -->
<div class="modal-overlay" id="songModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalInner"></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore, collection, query, orderBy, onSnapshot,
    doc, updateDoc, arrayUnion, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // ╔══════════════════════════════════════════════════════╗
  // ║   PASTE YOUR FIREBASE CONFIG HERE (same as admin)   ║
  // ╚══════════════════════════════════════════════════════╝
  const firebaseConfig = {
    apiKey: "AIzaSyBcLV1JG-Q28RlVMvJzY0Ganq4bWEer2vg",
    authDomain: "darshan-44221.firebaseapp.com",
    projectId: "darshan-44221",
    storageBucket: "darshan-44221.firebasestorage.app",
    messagingSenderId: "118769395771",
    appId: "1:118769395771:web:b9d13f77e7e706d0b1141e"
  };

  let db = null;
  let allSongs = [];
  let currentSongId = null;

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function formatDate(d) {
    if (!d) return '';
    return new Date(d).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
  }

  function timeAgo(iso) {
    const diff = Date.now() - new Date(iso).getTime();
    const m = Math.floor(diff/60000);
    if (m < 1) return 'just now';
    if (m < 60) return `${m}m ago`;
    const h = Math.floor(m/60);
    if (h < 24) return `${h}h ago`;
    return `${Math.floor(h/24)}d ago`;
  }

  try {
    if (firebaseConfig.apiKey === 'YOUR_API_KEY') throw new Error('not_configured');
    const app = initializeApp(firebaseConfig);
    db = getFirestore(app);
    listenToSongs();
  } catch(e) {
    document.getElementById('countBadge').textContent = '—';
    document.getElementById('songsGrid').innerHTML = `
      <div class="empty-state">
        <div class="icon">⚙️</div>
        <h3>Firebase Not Configured</h3>
        <p>The admin needs to set up Firebase. Open admin.html for instructions.</p>
      </div>`;
  }

  function listenToSongs() {
    const q = query(collection(db, 'songs'), orderBy('addedAt', 'desc'));
    onSnapshot(q, snap => {
      allSongs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      filterSongs();
    });
  }

  window.filterSongs = function() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    const songs = query
      ? allSongs.filter(s => s.title.toLowerCase().includes(query) || s.artist.toLowerCase().includes(query))
      : allSongs;
    renderGrid(songs);
  };

  function renderGrid(songs) {
    document.getElementById('countBadge').textContent = `${songs.length} song${songs.length !== 1 ? 's' : ''}`;
    const grid = document.getElementById('songsGrid');
    if (!songs.length) {
      grid.innerHTML = `<div class="empty-state"><div class="icon">🎵</div><h3>${document.getElementById('searchInput').value ? 'No Results' : 'No Songs Yet'}</h3><p>${document.getElementById('searchInput').value ? 'Try a different search.' : 'Check back soon!'}</p></div>`;
      return;
    }
    grid.innerHTML = songs.map((s, i) => `
      <div class="song-card" style="animation-delay:${i*0.04}s" onclick="window.openSong('${s.id}')">
        <div class="cover-wrap">
          <img class="card-cover" src="${esc(s.cover) || 'https://placehold.co/400x400/ddeeff/2563eb?text=♪'}"
            onerror="this.src='https://placehold.co/400x400/ddeeff/2563eb?text=♪'" alt="${esc(s.title)}"/>
        </div>
        <div class="card-body">
          <div class="card-title">${esc(s.title)}</div>
          <div class="card-artist">${esc(s.artist)}</div>
        </div>
        <div class="card-footer">
          <span class="card-date">${formatDate(s.date)}</span>
          <div class="card-badges">
            ${s.lyrics ? '<span class="badge badge-lyrics">Lyrics</span>' : ''}
            ${s.comments && s.comments.length ? `<span class="badge badge-comments">${s.comments.length} 💬</span>` : ''}
          </div>
        </div>
      </div>
    `).join('');
  }

  function buildAudioPlayer(url) {
    const lower = url.toLowerCase();
    if (/\.(mp3|ogg|wav|flac|aac|m4a|opus|webm)(\?.*)?$/.test(lower)) {
      return `<div class="audio-player">
        <div class="audio-player-label">🎵 Now Playing</div>
        <audio controls autoplay preload="metadata" style="width:100%;border-radius:8px;">
          <source src="${esc(url)}">
        </audio>
      </div>`;
    }
    const ytMatch = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);
    if (ytMatch) return `<div class="audio-player">
      <div class="audio-player-label">▶ YouTube</div>
      <iframe width="100%" height="90" src="https://www.youtube.com/embed/${ytMatch[1]}?autoplay=1&rel=0"
        frameborder="0" allow="autoplay; encrypted-media" allowfullscreen style="border-radius:8px;display:block;"></iframe>
    </div>`;
    const spMatch = url.match(/spotify\.com\/(track|episode|album|playlist)\/([A-Za-z0-9]+)/);
    if (spMatch) return `<div class="audio-player">
      <div class="audio-player-label">🎧 Spotify</div>
      <iframe src="https://open.spotify.com/embed/${spMatch[1]}/${spMatch[2]}"
        width="100%" height="80" frameborder="0"
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
        style="border-radius:8px;display:block;"></iframe>
    </div>`;
    if (lower.includes('soundcloud.com')) return `<div class="audio-player">
      <div class="audio-player-label">☁ SoundCloud</div>
      <iframe width="100%" height="80"
        src="https://w.soundcloud.com/player/?url=${encodeURIComponent(url)}&color=%232563eb&auto_play=true&hide_related=true&show_comments=false&show_user=true&show_reposts=false"
        frameborder="0" scrolling="no" style="border-radius:8px;display:block;"></iframe>
    </div>`;
    let platform = 'Open Link';
    if (lower.includes('apple')) platform = '🍎 Apple Music';
    else if (lower.includes('jiosaavn') || lower.includes('saavn')) platform = '🎵 JioSaavn';
    else if (lower.includes('gaana')) platform = '🎵 Gaana';
    else if (lower.includes('deezer')) platform = '🎶 Deezer';
    return `<div class="audio-player">
      <div class="audio-player-label">Stream</div>
      <a class="ext-link-btn" href="${esc(url)}" target="_blank" rel="noopener">↗ Listen on ${platform}</a>
      <div class="ext-link-platform">Opens in a new tab</div>
    </div>`;
  }

  window.openSong = function(id) {
    const song = allSongs.find(s => s.id === id);
    if (!song) return;
    currentSongId = id;

    const coverHTML = song.cover
      ? `<img class="modal-cover" src="${esc(song.cover)}" alt="${esc(song.title)}" onerror="this.style.display='none'"/>`
      : `<div class="modal-cover-placeholder">🎵</div>`;

    const comments = song.comments || [];
    const commentsHTML = comments.length
      ? [...comments].reverse().map(c => `
        <div class="comment-item">
          <div class="comment-name">${esc(c.name||'Anonymous')}</div>
          <div class="comment-text">${esc(c.text)}</div>
          <div class="comment-time">${c.time ? timeAgo(c.time) : ''}</div>
        </div>`).join('')
      : '<div class="no-comments">Be the first to comment! 👇</div>';

    document.getElementById('modalInner').innerHTML = `
      ${coverHTML}
      <div class="modal-body">
        <div class="modal-eyebrow">${esc(song.artist)}${song.date ? ' · ' + formatDate(song.date) : ''}</div>
        <div class="modal-title">${esc(song.title)}</div>
        ${song.audio ? buildAudioPlayer(song.audio) : ''}
        <div class="tabs">
          <button class="tab-btn active" onclick="switchTab('lyrics',this)">Lyrics</button>
          <button class="tab-btn" onclick="switchTab('about',this)">About</button>
          <button class="tab-btn" onclick="switchTab('comments',this)">Comments (${comments.length})</button>
        </div>
        <div class="tab-panel active" id="tab-lyrics">
          ${song.lyrics ? `<div class="lyrics-box">${esc(song.lyrics)}</div>` : '<p style="color:var(--muted);font-size:13px;">No lyrics added yet.</p>'}
        </div>
        <div class="tab-panel" id="tab-about">
          ${song.description ? `<p class="desc-box">${esc(song.description)}</p>` : '<p style="color:var(--muted);font-size:13px;">No description added.</p>'}
        </div>
        <div class="tab-panel" id="tab-comments">
          <div class="comment-form">
            <input class="name-input" id="commenterName" placeholder="Your name (optional)"/>
            <div class="comment-input-wrap">
              <textarea class="comment-input" id="commentInput" placeholder="Share your thoughts on this track…" rows="2"></textarea>
              <button class="btn-comment" onclick="window.postComment()">Post</button>
            </div>
          </div>
          <div class="comments-list" id="commentsList">${commentsHTML}</div>
        </div>
      </div>`;

    document.getElementById('songModal').classList.add('open');
    document.body.style.overflow = 'hidden';
  };

  window.switchTab = function(name, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
  };

  window.postComment = async function() {
    if (!db) return;
    const text = document.getElementById('commentInput').value.trim();
    if (!text) return;
    const name = document.getElementById('commenterName').value.trim() || 'Anonymous';
    const comment = { name, text, time: new Date().toISOString() };

    try {
      await updateDoc(doc(db, 'songs', currentSongId), {
        comments: arrayUnion(comment)
      });
      document.getElementById('commentInput').value = '';
      document.getElementById('commenterName').value = '';

      // Update local cache
      const song = allSongs.find(s => s.id === currentSongId);
      if (song) {
        if (!song.comments) song.comments = [];
        song.comments.push(comment);
        const list = document.getElementById('commentsList');
        const item = document.createElement('div');
        item.className = 'comment-item';
        item.innerHTML = `<div class="comment-name">${esc(name)}</div><div class="comment-text">${esc(text)}</div><div class="comment-time">just now</div>`;
        if (list.querySelector('.no-comments')) list.innerHTML = '';
        list.prepend(item);
        document.querySelectorAll('.tab-btn')[2].textContent = `Comments (${song.comments.length})`;
      }
    } catch(e) {
      alert('Failed to post comment: ' + e.message);
    }
  };

  window.closeModal = function() {
    document.getElementById('songModal').classList.remove('open');
    document.body.style.overflow = '';
    currentSongId = null;
  };

  document.getElementById('songModal').addEventListener('click', e => {
    if (e.target === document.getElementById('songModal')) window.closeModal();
  });

  document.addEventListener('keydown', e => { if (e.key === 'Escape') window.closeModal(); });
</script>
</body>
</html>
